# Use this with 
#   mypy --config-file=mypy-android.ini

[mypy]
python_version = 3.10
python_executable = .venv/bin/python
disable_error_code = import-not-found
exclude = (.venv|kivy|recipes|testbed)/
mypy_path = typings
packages = bleak, tests, examples
platform = android

[mypy-bleak.backends.p4android.*]
ignore_errors = True